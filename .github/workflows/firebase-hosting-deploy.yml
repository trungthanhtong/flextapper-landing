name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy live site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Write Firebase credentials
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLEXTAPPER_A9E99 }}"
        run: |
          if [[ -z "$FIREBASE_SERVICE_ACCOUNT" ]]; then
            echo "::error::Missing FIREBASE_SERVICE_ACCOUNT_FLEXTAPPER_A9E99 repository secret"
            exit 1
          fi

          service_account_path="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$service_account_path"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$service_account_path" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting
        shell: bash
        run: |
          set +e
          npx firebase-tools@latest deploy --only hosting --project flextapper-a9e99 --json 2>&1 | tee "$RUNNER_TEMP/firebase-deploy.log"
          deploy_status=${PIPESTATUS[0]}
          set -e

          if [[ "$deploy_status" -eq 0 ]]; then
            exit 0
          fi

          if grep -Fq "is the current active version" "$RUNNER_TEMP/firebase-deploy.log"; then
            echo "Firebase Hosting reported this version is already active; treating deploy as successful."
            exit 0
          fi

          exit "$deploy_status"
